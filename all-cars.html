<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurex - Premium Car Rental</title>

    <!-- FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/all-cars.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <img src="assets/Logo.png" alt="Aurex Logo">
            <span>Aurex</span>
        </div>
    </header>

    <!-- MAIN -->
    <main class="page-content">

        <div class="container py-4">

            <!-- HERO -->
            <div class="hero-header">

                <!-- LEFT -->
                <div class="hero-text">

                    <h1>All Cars</h1>

                    <p class="breadcrumb">
                        <span>
                            <a href="featured.html">Home</a>
                            ›
                            <a href="all-cars.html" class="active">Cars</a>
                        </span>
                    </p>

                    <p class="subtitle">
                        Explore our premium collection of luxury performance vehicles.
                    </p>

                </div>

                <!-- RIGHT FILTERS -->
                <div class="hero-filters">

                    <!-- CATEGORY DROPDOWN -->
                    <div class="custom-dropdown" id="categoryDropdown">

                        <div class="dropdown-selected">
                            <span>All</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>

                        <div class="dropdown-options">

                            <div class="dropdown-option active" data-value="All">
                                <i class="fa-solid fa-car-side"></i>
                                All
                            </div>

                            <div class="dropdown-option" data-value="Sports Car">
                                <i class="fa-solid fa-gauge-high"></i>
                                Sports Cars
                            </div>

                            <div class="dropdown-option" data-value="Luxury SUV">
                                <i class="fa-solid fa-car"></i>
                                Luxury SUVs
                            </div>

                            <div class="dropdown-option" data-value="Luxury Van">
                                <i class="fa-solid fa-van-shuttle"></i>
                                Luxury Vans
                            </div>

                            <div class="dropdown-option" data-value="Limousine">
                                <i class="fa-solid fa-car-rear"></i>
                                Limousine
                            </div>

                            <div class="dropdown-option" data-value="Classic Car">
                                <i class="fa-solid fa-truck-monster"></i>
                                Classic Car
                            </div>

                        </div>

                    </div>

                    <!-- PRICE DROPDOWN -->
                    <div class="custom-dropdown" id="priceDropdown">

                        <div class="dropdown-selected">
                            <span>Sort by Price</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>

                        <div class="dropdown-options">

                            <div class="dropdown-option active" data-value="default">
                                <i class="fa-solid fa-sliders"></i>
                                Sort by Price
                            </div>

                            <div class="dropdown-option" data-value="low-high">
                                <i class="fa-solid fa-arrow-trend-up"></i>
                                Low → High
                            </div>

                            <div class="dropdown-option" data-value="high-low">
                                <i class="fa-solid fa-arrow-trend-down"></i>
                                High → Low
                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- CAR GRID -->
            <div class="row g-4" id="carsContainer"></div>

        </div>

    </main>

    <!-- JS -->
    <script src="script/cars.js"></script>
    <script src="script/all-cars.js"></script>
    <script src="script/featured.js"></script>

</body>
</html>

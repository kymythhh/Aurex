<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurex - Premium Car Rental</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/all-cars.css">
    
</head>
<body>

    <header>
        <div class="logo">
            <img src="assets/Logo.png" alt="Aurex Logo">
            <span>Aurex</span>
        </div>
    </header>

    <main class="page-content">
        <div class="container py-4">

        <!-- HEADER + FILTER -->
        <div class="hero-header">

        <!-- LEFT TEXT -->
        <div class="hero-text">
            <h1>All Cars</h1>
            <p class="breadcrumb">
                <span> <a href="featured.html">Home</a> › <a href="all-cars.html" class="active">Cars</a> </span>
            </p>
            <p class="subtitle">
                Explore our premium collection of luxury performance vehicles.
            </p>
        </div>

        <!-- RIGHT FILTERS -->
        <div class="hero-filters">
            <select id="categoryFilter" class="filter-dropdown">
                <option value="All">All</option>
                <option value="Sports Car">Sports Cars</option>
                <option value="Luxury SUV">Luxury SUVs</option>
                <option value="Luxury Van">Luxury Vans</option>
                <option value="Limousine">Limousine</option>
                <option value="Classic Car">Classic Car</option>
            </select>

            <select id="priceSort" class="filter-dropdown">
                <option value="default">Sort by Price</option>
                <option value="low-high">Low → High</option>
                <option value="high-low">High → Low</option>
            </select>
        </div>

    </div>

        <!-- GRID -->
        <div class="row g-4" id="carsContainer"></div>

    </div>
</main>

<script src="script/cars.js"></script>
<script src="script/all-cars.js"></script>
</body>
</html>

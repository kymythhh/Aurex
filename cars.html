<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Cars</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="cars.css">
</head>
<body>



</section>

<section class="py-5 bg-black">
    <div class="container-fluid px-4">
        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-lg-4 col-md-6">
                <div class="car-card">
                    <div class="car-image">
                        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1000" alt="">
                        <div class="rating">
                            <i class="fas fa-star"></i> 4.9
                        </div>
                    </div>

                    <div class="car-content">
                        <span class="category">Luxury Sports</span>
                        <h3>Lamborghini Aventador</h3>

                        <div class="car-info">
                            <span><i class="fas fa-gas-pump"></i> Premium</span>
                            <span><i class="fas fa-user-group"></i> 2</span>
                            <span><i class="fas fa-gear"></i> Auto</span>
                        </div>

                        <div class="price-row">
                            <div>
                                <h2>$899<span>/day</span></h2>
                            </div>

                            <button class="btn rent-btn">
                                Rent Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-lg-4 col-md-6">
                <div class="car-card">
                    <div class="car-image">
                        <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=1000" alt="">
                        <div class="rating">
                            <i class="fas fa-star"></i> 4.8
                        </div>
                    </div>

                    <div class="car-content">
                        <span class="category">Performance</span>
                        <h3>Porsche 911 GT3</h3>

                        <div class="car-info">
                            <span><i class="fas fa-gas-pump"></i> Premium</span>
                            <span><i class="fas fa-user-group"></i> 2</span>
                            <span><i class="fas fa-gear"></i> Manual</span>
                        </div>

                        <div class="price-row">
                            <div>
                                <h2>$749<span>/day</span></h2>
                            </div>

                            <button class="btn rent-btn">
                                Rent Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-lg-4 col-md-6">
                <div class="car-card">
                    <div class="car-image">
                        <img src="https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=1000" alt="">
                        <div class="rating">
                            <i class="fas fa-star"></i> 5.0
                        </div>
                    </div>

                    <div class="car-content">
                        <span class="category">Exotic Sports</span>
                        <h3>Ferrari 458 Italia</h3>

                        <div class="car-info">
                            <span><i class="fas fa-gas-pump"></i> Premium</span>
                            <span><i class="fas fa-user-group"></i> 2</span>
                            <span><i class="fas fa-gear"></i> Auto</span>
                        </div>

                        <div class="price-row">
                            <div>
                                <h2>$999<span>/day</span></h2>
                            </div>

                            <button class="btn rent-btn">
                                Rent Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
